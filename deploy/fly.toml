# Fly.io config for the always-on demo. Rename `app` to something unique to you.
app = "drivethru-demo-andrewphankt"
primary_region = "iad"            # pick one near you: https://fly.io/docs/reference/regions/

[build]
  dockerfile = "deploy/Dockerfile"

[env]
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false      # keep it ALWAYS ON (a link that's always up)
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "2gb"                  # bump to 4gb if it runs out of memory
